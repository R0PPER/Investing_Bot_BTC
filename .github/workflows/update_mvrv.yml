name: Update MVRV Data

on:
  schedule:
    - cron: '5 0 * * *'  # 00:05 UTC κάθε μέρα
  workflow_dispatch:

jobs:
  update-mvrv:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
      
      - name: Run MVRV updater
        env:
          MVRV_API_KEY_1: ${{ secrets.MVRV_API_KEY_1 }}
          MVRV_API_KEY_2: ${{ secrets.MVRV_API_KEY_2 }}
          MVRV_API_KEY_3: ${{ secrets.MVRV_API_KEY_3 }}
        run: |
          python update_mvrv.py
      
      - name: Commit updated MVRV file
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add mvrv_zscore_full_history.csv
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-update MVRV data [skip ci]"
          git push
