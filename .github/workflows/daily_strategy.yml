name: BTC Daily Strategy

on:
  schedule:
    # 04:10 Ελλάδα (καλοκαίρι) = 01:10 UTC
    - cron: '10 1 * * *'
    # 09:00 Ελλάδα (καλοκαίρι) = 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:

jobs:
  run-strategy:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      
      - name: Install dependencies
        run: |
          pip install --upgrade pip
          pip install -r requirements.txt
          pip install firebase-admin
      
      - name: Create Firebase credentials file
        run: |
          echo '${{ secrets.FIREBASE_CREDENTIALS }}' > firebase_creds.json
      
      - name: Run daily strategy
        env:
          TELEGRAM_TOKEN: ${{ secrets.TELEGRAM_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
          MVRV_API_KEY_1: ${{ secrets.MVRV_API_KEY_1 }}
          MVRV_API_KEY_2: ${{ secrets.MVRV_API_KEY_2 }}
          MVRV_API_KEY_3: ${{ secrets.MVRV_API_KEY_3 }}
          FIREBASE_CREDENTIALS_PATH: firebase_creds.json
          DRY_RUN: 'false'
        run: |
          python daily_strategy.py
